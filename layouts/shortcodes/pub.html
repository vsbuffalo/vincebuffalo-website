{{- $thumb := .Get "thumb" -}}
{{- $blog := .Get "blog" -}}
{{- $link := .Get "link" -}}
<article class="post-card pub-card">
  {{- with $thumb }}
  <div class="post-image">
    {{- with $link }}<a href="{{ . }}">{{ end -}}
    <img src="{{ strings.TrimPrefix "/" $thumb | relURL }}" alt="" loading="lazy">
    {{- with $link }}</a>{{ end -}}
  </div>
  {{- end }}
  <div class="post-info">
    <p class="pub-citation">{{ .Inner | markdownify }}
    {{- with $blog }} <a href="{{ strings.TrimPrefix "/" . | relURL }}">[blog post]</a>{{ end }}</p>
  </div>
</article>
