baseURL: "https://vincebuffalo.com/new/"
title: "Vince Buffalo"
theme: "hextra"

enableRobotsTXT: true
enableGitInfo: true
enableEmoji: true
defaultContentLanguage: "en"

disableKinds: ["taxonomy", "term"]

outputs:
  home: ["HTML", "RSS", "JSON"]
  page: ["HTML"]
  section: ["HTML", "RSS"]

module:
  hugoVersion:
    extended: true
    min: "0.87.0"

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ['$$', '$$']]
          inline: [['\(', '\)']]
        enable: true

enableInlineShortcodes: true

pagination:
  pagerSize: 100

imaging:
  anchor: 'Center'

taxonomies:
  tag: "tags"
  category: "categories"
  author: "authors"
  series: "series"

sitemap:
  changefreq: 'daily'
  filename: 'sitemap.xml'
  priority: 0.5

related:
  threshold: 0
  toLower: false
  indices:
    - name: "tags"
      weight: 100
    - name: "categories"
      weight: 100
    - name: "series"
      weight: 50
    - name: "authors"
      weight: 20
    - name: "date"
      weight: 10
    - applyFilter: false
      name: 'fragmentrefs'
      type: 'fragments'
      weight: 10

menu:
  main:
    - name: "Blog"
      pageRef: "/blog"
      weight: 1
    - name: "Book"
      pageRef: "/book"
      weight: 2
    - name: "Papers"
      pageRef: "/papers"
      weight: 3
    - name: "About"
      pageRef: "/about"
      weight: 4

params:
  description: "The personal blog of Vince Buffalo."

  math:
    engine: mathjax

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logo.svg
      width: 64
      height: 64
    width: wide
    links:
      - name: GitHub
        icon: github
        url: https://github.com/vsbuffalo
  
  page:
    width: full
  
  theme:
    default: system
    displayToggle: true
  
  footer:
    enable: true
    displayCopyright: false
    displayPoweredBy: false
    width: normal
  
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
  
  search:
    enable: false
  
  blog:
    list:
      displayTags: true
      sortBy: date
      sortOrder: desc
    article:
      displayPagination: true
  
  toc:
    displayTags: true
  
  highlight:
    copy:
      enable: true
      display: hover
